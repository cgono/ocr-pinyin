name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - staging

permissions:
  contents: read

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync backend dependencies
        run: cd backend && uv sync --frozen --dev

      - name: Ruff
        run: cd backend && uv run ruff check app tests

      - name: Pytest
        run: cd backend && uv run pytest tests --ignore=tests/contract

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: ESLint
        run: npm run lint --prefix frontend

      - name: Build
        run: npm run build --prefix frontend

      - name: Vitest
        run: npm run test --prefix frontend

  contract-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync backend dependencies
        run: cd backend && uv sync --frozen --dev

      - name: Contract tests
        run: cd backend && uv run pytest tests/contract/response_envelopes -q

  render-yaml-check:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_WORKSPACE_ID: ${{ vars.RENDER_WORKSPACE_ID }}
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required secrets
        run: |
          [[ -n "$RENDER_API_KEY" ]] || { echo "ERROR: RENDER_API_KEY secret not configured. See docs/deployment.md for CI setup instructions."; exit 1; }
          [[ -n "$RENDER_WORKSPACE_ID" ]] || { echo "ERROR: RENDER_WORKSPACE_ID variable not configured. See docs/deployment.md for CI setup instructions."; exit 1; }

      - name: Install Render CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/render-oss/cli/refs/tags/v2.15.0/bin/install.sh | sh
          echo "$HOME/.render/bin" >> $GITHUB_PATH

      - name: Validate render.yaml
        run: render blueprints validate render.yaml --workspace "$RENDER_WORKSPACE_ID" --output text --confirm
